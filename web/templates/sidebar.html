<script>
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed')}
// Highlight active nav
(function(){const p=location.pathname;const map={'/':"nav-dashboard",'/traffic':"nav-traffic",'/topology':"nav-topology",'/settings':"nav-settings",'/backups':"nav-backups",'/logs':"nav-logs"};const id=map[p];if(id)document.getElementById(id).classList.add('active')})();
function themeColor(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim()}

function confirmLogout(event) {
  event.preventDefault();
  Swal.fire({
    title: NetSentinelI18n.translate('Confirm Logout'),
    text: NetSentinelI18n.translate('Are you sure you want to log out of NetSentinel AI?'),
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: NetSentinelI18n.translate('Logout'),
    cancelButtonText: NetSentinelI18n.translate('Cancel'),
    background: themeColor('--card'),
    color: themeColor('--txt'),
    confirmButtonColor: '#ef4444',
    cancelButtonColor: '#3a3f58',
  }).then((result) => {
    if (result.isConfirmed) {
      window.location.href = '/logout';
    }
  });
}

// Global remediation manager to persist progress cards across page reloads
const RemediationManager = {
  cardId: 'remediation-global-progress-card',
  socket: null,

  init() {
    // Inject CSS styles for glassmorphic card in bottom-right corner
    const style = document.createElement('style');
    style.innerHTML = `
      .remediation-progress-card {
        position: fixed;
        bottom: 24px;
        right: 24px;
        width: 320px;
        background: rgba(20, 20, 25, 0.85);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        z-index: 99999;
        display: flex;
        align-items: center;
        gap: 16px;
        color: #fff;
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        animation: slideInRemediation 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        font-family: 'Inter', sans-serif;
      }
      :root[data-theme="light"] .remediation-progress-card {
        background: rgba(255, 255, 255, 0.85);
        border-color: rgba(0, 0, 0, 0.08);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        color: #1a1f2c;
      }
      .remediation-progress-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top-color: #6366f1;
        animation: remediationSpin 1s linear infinite;
        flex-shrink: 0;
      }
      :root[data-theme="light"] .remediation-progress-spinner {
        border-color: rgba(0, 0, 0, 0.08);
        border-top-color: #6366f1;
      }
      .remediation-progress-content {
        flex: 1;
      }
      .remediation-progress-title {
        font-size: 0.85rem;
        font-weight: 700;
        margin-bottom: 4px;
        color: #fff;
      }
      :root[data-theme="light"] .remediation-progress-title {
        color: #1a1f2c;
      }
      .remediation-progress-desc {
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.3;
      }
      :root[data-theme="light"] .remediation-progress-desc {
        color: #4a5568;
      }
      @keyframes remediationSpin {
        to { transform: rotate(360deg); }
      }
      @keyframes slideInRemediation {
        from { transform: translateY(40px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
    `;
    document.head.appendChild(style);

    // Reconstruct state if navigating page
    const active = sessionStorage.getItem('active_remediation');
    if (active) {
      const task = JSON.parse(active);
      if (Date.now() - task.startTime > 90000) { // 90s auto-timeout
        sessionStorage.removeItem('active_remediation');
      } else {
        this.show(task.title, task.desc);
        this.setupSocket();
      }
    }

    // Apply translation on load
    this.translatePage();
    window.translationObserver.observe(document.body, { childList: true, subtree: true, characterData: true });
  },

  show(title, desc) {
    let card = document.getElementById(this.cardId);
    if (!card) {
      card = document.createElement('div');
      card.id = this.cardId;
      card.className = 'remediation-progress-card';
      document.body.appendChild(card);
    }
    card.innerHTML = `
      <div class="remediation-progress-spinner"></div>
      <div class="remediation-progress-content">
        <div class="remediation-progress-title">${title}</div>
        <div class="remediation-progress-desc">${desc}</div>
      </div>
    `;
  },

  hide() {
    const card = document.getElementById(this.cardId);
    if (card) {
      card.style.opacity = '0';
      card.style.transform = 'translateY(40px)';
      setTimeout(() => card.remove(), 300);
    }
  },

  start(device, intf, action, title, desc) {
    const task = {
      device,
      intf,
      action,
      title,
      desc,
      startTime: Date.now()
    };
    sessionStorage.setItem('active_remediation', JSON.stringify(task));
    this.show(title, desc);
    this.setupSocket();
  },

  setupSocket() {
    if (this.socket) return;
    
    const connectSocket = () => {
      if (typeof io === 'undefined') {
        setTimeout(connectSocket, 200);
        return;
      }
      this.socket = io();
      this.socket.on('remediation_result', d => {
        const active = sessionStorage.getItem('active_remediation');
        if (!active) return;
        
        const task = JSON.parse(active);
        if (d.device === task.device && d.intf === task.intf) {
          sessionStorage.removeItem('active_remediation');
          this.hide();
          
          if (typeof Swal !== 'undefined') {
            const Toast = Swal.mixin({
              toast: true,
              position: 'bottom-end',
              showConfirmButton: false,
              timer: 4000,
              timerProgressBar: true,
              background: themeColor('--card'),
              color: themeColor('--txt')
            });
            Toast.fire({
              icon: d.success ? 'success' : 'error',
              title: d.message
            });
          }
          
          // Call local page update functions
          if (typeof refresh === 'function') {
            refresh();
          } else if (typeof fetchTopology === 'function') {
            fetchTopology();
          }
        }
      });
    };
    connectSocket();
  }
};
